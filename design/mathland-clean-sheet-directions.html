.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;main id=&quot;mathland-clean-sheet&quot;&gt;
  &lt;style&gt;
    #mathland-clean-sheet {
      --line: color-mix(in srgb, var(--foreground) 18%, transparent);
      --line-soft: color-mix(in srgb, var(--foreground) 9%, transparent);
      display: flex;
      flex-direction: column;
      gap: 28px;
      color: var(--foreground);
      background:
        radial-gradient(circle at 88% 4%, color-mix(in srgb, var(--viz-series-5) 13%, transparent), transparent 31%),
        radial-gradient(circle at 5% 40%, color-mix(in srgb, var(--viz-series-2) 9%, transparent), transparent 26%);
    }

    #mathland-clean-sheet .kicker,
    #mathland-clean-sheet .route-code,
    #mathland-clean-sheet .micro-label {
      font-family: var(--font-mono);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    #mathland-clean-sheet .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(200px, .55fr);
      gap: 22px;
      align-items: end;
      padding-block: 22px;
      border-block: 1px solid var(--line);
    }

    #mathland-clean-sheet .mast-copy {
      display: grid;
      gap: 12px;
    }

    #mathland-clean-sheet .mast-copy h1 {
      max-width: 24ch;
    }

    #mathland-clean-sheet .mast-copy p {
      max-width: 62ch;
    }

    #mathland-clean-sheet .thesis {
      display: grid;
      gap: 8px;
      padding-left: 16px;
      border-left: 3px solid var(--viz-series-1);
    }

    #mathland-clean-sheet .split-ledger {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #mathland-clean-sheet .ledger-list,
    #mathland-clean-sheet .compact-list,
    #mathland-clean-sheet .route-notes {
      margin: 0;
      padding-left: 18px;
    }

    #mathland-clean-sheet .ledger-list li,
    #mathland-clean-sheet .compact-list li,
    #mathland-clean-sheet .route-notes li {
      margin-block: 6px;
    }

    #mathland-clean-sheet .section-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, .7fr);
      gap: 18px;
      align-items: end;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    #mathland-clean-sheet .principle-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0 18px;
    }

    #mathland-clean-sheet .principle {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      padding-block: 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .principle-index {
      color: var(--muted-foreground);
      font-family: var(--font-mono);
    }

    #mathland-clean-sheet .principle-copy {
      display: grid;
      gap: 4px;
    }

    #mathland-clean-sheet .principle-copy p {
      color: var(--muted-foreground);
    }

    #mathland-clean-sheet .evidence {
      display: grid;
      gap: 0;
    }

    #mathland-clean-sheet .evidence-row {
      display: grid;
      grid-template-columns: minmax(120px, .65fr) minmax(0, 1.35fr) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding-block: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .route-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #mathland-clean-sheet .route-stage {
      display: grid;
      grid-template-columns: minmax(0, .72fr) minmax(0, 1.28fr);
      gap: 18px;
      align-items: stretch;
    }

    #mathland-clean-sheet .route-brief {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding-block: 8px;
    }

    #mathland-clean-sheet .route-title {
      display: grid;
      gap: 8px;
    }

    #mathland-clean-sheet .route-title p {
      color: var(--muted-foreground);
    }

    #mathland-clean-sheet .route-facts {
      display: grid;
      gap: 0;
    }

    #mathland-clean-sheet .route-fact {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      padding-block: 8px;
      border-top: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .route-fact span:first-child {
      color: var(--muted-foreground);
    }

    #mathland-clean-sheet .mockup {
      display: grid;
      min-height: 420px;
      padding: 0;
    }

    #mathland-clean-sheet .mock-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 420px;
    }

    #mathland-clean-sheet .mock-topbar,
    #mathland-clean-sheet .mock-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .mock-footer {
      border-top: 1px solid var(--line-soft);
      border-bottom: 0;
    }

    #mathland-clean-sheet .mock-body {
      min-height: 0;
    }

    #mathland-clean-sheet .atlas-body {
      display: grid;
      grid-template-columns: 150px 1fr;
    }

    #mathland-clean-sheet .atlas-rail {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 18px 14px;
      border-right: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .atlas-map,
    #mathland-clean-sheet .observatory-scene {
      position: relative;
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
      background:
        linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #mathland-clean-sheet .map-svg,
    #mathland-clean-sheet .scene-svg,
    #mathland-clean-sheet .studio-svg {
      width: 100%;
      height: auto;
      color: var(--foreground);
    }

    #mathland-clean-sheet .map-route,
    #mathland-clean-sheet .vector-axis,
    #mathland-clean-sheet .projection-line {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    #mathland-clean-sheet .map-route.active,
    #mathland-clean-sheet .vector-u {
      stroke: var(--viz-series-1);
      stroke-width: 4;
    }

    #mathland-clean-sheet .vector-v {
      stroke: var(--viz-series-2);
      stroke-width: 4;
    }

    #mathland-clean-sheet .map-node {
      fill: var(--background);
      stroke: var(--foreground);
      stroke-width: 2;
    }

    #mathland-clean-sheet .map-node.done {
      fill: var(--viz-series-3);
      stroke: var(--viz-series-3);
    }

    #mathland-clean-sheet .map-node.current {
      fill: var(--primary);
      stroke: var(--primary);
    }

    #mathland-clean-sheet .map-label,
    #mathland-clean-sheet .plot-label {
      fill: var(--foreground);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    #mathland-clean-sheet .studio-body {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(180px, .85fr);
    }

    #mathland-clean-sheet .studio-canvas {
      display: grid;
      place-items: center;
      padding: 16px;
      border-right: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .studio-coach {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px 14px;
    }

    #mathland-clean-sheet .studio-result {
      display: grid;
      gap: 4px;
      padding-block: 12px;
      border-block: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .range-wrap {
      display: grid;
      gap: 8px;
    }

    #mathland-clean-sheet .observatory-body {
      display: grid;
      grid-template-columns: minmax(190px, .75fr) minmax(0, 1.25fr);
    }

    #mathland-clean-sheet .observatory-script {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      padding: 24px 18px;
      border-right: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .observatory-scene {
      background:
        radial-gradient(circle at center, color-mix(in srgb, var(--viz-series-5) 18%, transparent), transparent 42%),
        linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: auto, 28px 28px, 28px 28px;
    }

    #mathland-clean-sheet .projection-line {
      stroke: var(--viz-series-4);
      stroke-width: 5;
      transition: opacity .25s ease;
    }

    #mathland-clean-sheet .decision-table {
      display: grid;
      gap: 0;
    }

    #mathland-clean-sheet .decision-row {
      display: grid;
      grid-template-columns: 112px repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding-block: 11px;
      border-bottom: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .decision-row:first-child {
      border-bottom-color: var(--line);
    }

    #mathland-clean-sheet .decision-row &gt; :first-child {
      color: var(--muted-foreground);
    }

    #mathland-clean-sheet .synthesis {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(220px, .8fr);
      gap: 18px;
      align-items: start;
      padding-block: 20px;
      border-block: 1px solid var(--line);
    }

    #mathland-clean-sheet .synthesis-copy {
      display: grid;
      gap: 12px;
    }

    #mathland-clean-sheet .stack-diagram {
      display: grid;
      gap: 6px;
    }

    #mathland-clean-sheet .stack-band {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 10px;
      padding: 10px;
      background: color-mix(in srgb, var(--viz-series-1) 9%, transparent);
    }

    #mathland-clean-sheet .stack-band:nth-child(2) {
      background: color-mix(in srgb, var(--viz-series-2) 9%, transparent);
    }

    #mathland-clean-sheet .stack-band:nth-child(3) {
      background: color-mix(in srgb, var(--viz-series-5) 9%, transparent);
    }

    #mathland-clean-sheet .experiment-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    #mathland-clean-sheet .audience-contract {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      padding-block: 14px;
      border-bottom: 1px solid var(--line);
    }

    #mathland-clean-sheet .contract-column {
      display: grid;
      gap: 8px;
    }

    #mathland-clean-sheet .domain-paths {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding-top: 14px;
    }

    #mathland-clean-sheet .domain-path {
      display: grid;
      gap: 8px;
      padding-top: 12px;
      border-top: 3px solid var(--viz-series-1);
    }

    #mathland-clean-sheet .domain-path:nth-child(2) { border-color: var(--viz-series-2); }
    #mathland-clean-sheet .domain-path:nth-child(3) { border-color: var(--viz-series-5); }

    #mathland-clean-sheet .path-sequence {
      color: var(--muted-foreground);
      font-family: var(--font-mono);
    }

    #mathland-clean-sheet .flagship {
      display: grid;
      grid-template-columns: minmax(0, .8fr) minmax(0, 1.2fr);
      gap: 18px;
      align-items: start;
      padding-block: 18px;
      border-block: 1px solid var(--line);
    }

    #mathland-clean-sheet .flagship-copy,
    #mathland-clean-sheet .flagship-loop {
      display: grid;
      gap: 10px;
    }

    #mathland-clean-sheet .loop-step {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      padding-block: 8px;
      border-bottom: 1px solid var(--line-soft);
    }

    #mathland-clean-sheet .experiment {
      display: grid;
      gap: 8px;
      padding-top: 12px;
      border-top: 3px solid var(--line);
    }

    #mathland-clean-sheet .experiment:nth-child(1) { border-color: var(--viz-series-1); }
    #mathland-clean-sheet .experiment:nth-child(2) { border-color: var(--viz-series-2); }
    #mathland-clean-sheet .experiment:nth-child(3) { border-color: var(--viz-series-5); }

    #mathland-clean-sheet .source-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 18px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    #mathland-clean-sheet [hidden] {
      display: none !important;
    }

    @media (max-width: 660px) {
      #mathland-clean-sheet .masthead,
      #mathland-clean-sheet .section-head,
      #mathland-clean-sheet .route-stage,
      #mathland-clean-sheet .synthesis {
        grid-template-columns: 1fr;
      }

      #mathland-clean-sheet .principle-grid,
      #mathland-clean-sheet .split-ledger,
      #mathland-clean-sheet .audience-contract,
      #mathland-clean-sheet .domain-paths,
      #mathland-clean-sheet .experiment-grid,
      #mathland-clean-sheet .source-list {
        grid-template-columns: 1fr;
      }

      #mathland-clean-sheet .flagship {
        grid-template-columns: 1fr;
      }

      #mathland-clean-sheet .evidence-row {
        grid-template-columns: 96px 1fr;
      }

      #mathland-clean-sheet .evidence-row &gt; :last-child {
        grid-column: 2;
      }

      #mathland-clean-sheet .decision-row {
        grid-template-columns: 72px repeat(3, minmax(0, 1fr));
        overflow-wrap: anywhere;
      }

      #mathland-clean-sheet .atlas-body,
      #mathland-clean-sheet .studio-body,
      #mathland-clean-sheet .observatory-body {
        grid-template-columns: 1fr;
      }

      #mathland-clean-sheet .atlas-rail,
      #mathland-clean-sheet .studio-canvas,
      #mathland-clean-sheet .observatory-script {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #mathland-clean-sheet .projection-line { transition: none; }
    }
  &lt;/style&gt;

  &lt;section class=&quot;masthead&quot; aria-labelledby=&quot;reboot-title&quot;&gt;
    &lt;div class=&quot;mast-copy&quot;&gt;
      &lt;span class=&quot;kicker text-muted&quot;&gt;Mathland / clean-sheet proposition / 12 July 2026&lt;/span&gt;
      &lt;h1 id=&quot;reboot-title&quot;&gt;Stop polishing the course shell. Build a place where mathematics happens.&lt;/h1&gt;
      &lt;p&gt;The current product is organized around content delivery. The next product should be organized around learner action: orient, attempt, notice, revise, connect, retrieve.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;thesis&quot;&gt;
      &lt;span class=&quot;micro-label text-muted&quot;&gt;North star&lt;/span&gt;
      &lt;strong&gt;Math is something you do with a model until it becomes a way you see.&lt;/strong&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;split-ledger&quot; aria-label=&quot;What survives and what goes&quot;&gt;
    &lt;article class=&quot;card&quot;&gt;
      &lt;span class=&quot;micro-label text-muted&quot;&gt;Earns its way forward&lt;/span&gt;
      &lt;ul class=&quot;ledger-list&quot;&gt;
        &lt;li&gt;Core lesson ideas, examples and real-world hooks&lt;/li&gt;
        &lt;li&gt;Ten characters as guides, not mascots&lt;/li&gt;
        &lt;li&gt;Interactive mathematical primitives&lt;/li&gt;
        &lt;li&gt;Module prerequisite structure&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/article&gt;
    &lt;article class=&quot;card&quot;&gt;
      &lt;span class=&quot;micro-label text-muted&quot;&gt;Deliberately discarded&lt;/span&gt;
      &lt;ul class=&quot;ledger-list&quot;&gt;
        &lt;li&gt;Homepage-as-marketing-page&lt;/li&gt;
        &lt;li&gt;Eight-section lesson jukebox&lt;/li&gt;
        &lt;li&gt;Generic dashboard and course-card chrome&lt;/li&gt;
        &lt;li&gt;Completion masquerading as mastery&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/article&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;principles-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;01 / first principles&lt;/span&gt;
        &lt;h2 id=&quot;principles-title&quot;&gt;The product laws&lt;/h2&gt;
      &lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;These are stronger than a visual style. Every screen and flow should be rejected if it violates them.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;principle-grid&quot;&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;01&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;Action before exposition&lt;/strong&gt;&lt;p&gt;Start with a question, prediction or manipulable model. Explain into the learner’s attention—not before it exists.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;02&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;One cognitive job per moment&lt;/strong&gt;&lt;p&gt;Keep words, diagrams and controls spatially coupled. Remove every element that does not help the current move.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;03&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;Agency with a visible horizon&lt;/strong&gt;&lt;p&gt;Learners can choose routes and tools while always knowing where they are, why it matters and what comes next.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;04&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;Practice changes shape&lt;/strong&gt;&lt;p&gt;Move from worked example to faded support to independent transfer. Do not repeat the same multiple-choice pattern.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;05&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;Memory is a return loop&lt;/strong&gt;&lt;p&gt;A lesson is not done when viewed. Bring important ideas back through spaced, mixed retrieval.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
      &lt;article class=&quot;principle&quot;&gt;
        &lt;span class=&quot;principle-index&quot;&gt;06&lt;/span&gt;
        &lt;div class=&quot;principle-copy&quot;&gt;&lt;strong&gt;Accessibility is interaction design&lt;/strong&gt;&lt;p&gt;Every drag has a non-drag path; focus is obvious; navigation and help remain predictable.&lt;/p&gt;&lt;/div&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;evidence-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;02 / research translated&lt;/span&gt;
        &lt;h2 id=&quot;evidence-title&quot;&gt;Evidence → product consequence&lt;/h2&gt;
      &lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;The evidence does not prescribe a visual style. It constrains the learning mechanics the style must serve.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;evidence&quot; role=&quot;table&quot; aria-label=&quot;Research evidence and product implications&quot;&gt;
      &lt;div class=&quot;evidence-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;cell&quot;&gt;Active learning&lt;/strong&gt;&lt;span role=&quot;cell&quot;&gt;Across 225 STEM studies, active learning improved performance and reduced failure compared with lecture-led instruction.&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;The default unit is a learner move, not a content block.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;evidence-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;cell&quot;&gt;Retrieval&lt;/strong&gt;&lt;span role=&quot;cell&quot;&gt;A systematic review of 50 classroom experiments found robust benefits across settings and formats.&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Return to concepts after delay; progress must track usable recall.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;evidence-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;cell&quot;&gt;Multimedia&lt;/strong&gt;&lt;span role=&quot;cell&quot;&gt;Coherence, signaling and spatial/temporal contiguity reduce extraneous processing.&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Put the explanation beside the changing object; ornament never competes with the idea.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;evidence-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;cell&quot;&gt;Learner agency&lt;/strong&gt;&lt;span role=&quot;cell&quot;&gt;CAST UDL 3.0 emphasizes choice, authentic goals, flexible expression, graduated support and progress monitoring.&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Offer meaningful route and response choices without abandoning orientation.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;evidence-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;cell&quot;&gt;Accessible control&lt;/strong&gt;&lt;span role=&quot;cell&quot;&gt;WCAG 2.2 strengthens focus visibility, target sizing, non-drag alternatives and predictable help.&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Keyboard and touch are first-class design inputs, not an audit phase.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

          &lt;div class=&quot;route-fact&quot;&gt;&lt;span&gt;Feels like&lt;/span&gt;&lt;strong&gt;Desmos crossed with a masterclass workbench&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;route-fact&quot;&gt;&lt;span&gt;Characters&lt;/span&gt;&lt;strong&gt;Coaches who intervene only when useful&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;route-fact&quot;&gt;&lt;span&gt;Risk&lt;/span&gt;&lt;strong&gt;Coldness or repetition without a strong narrative layer&lt;/strong&gt;&lt;/div&gt;
          &lt;div class=&quot;route-fact&quot;&gt;&lt;span&gt;Proof&lt;/span&gt;&lt;strong&gt;Does every five minutes produce a learner action?&lt;/strong&gt;&lt;/div&gt;

          &lt;/div&gt;
          &lt;div class=&quot;mock-footer&quot;&gt;&lt;span class=&quot;text-muted&quot;&gt;Nothing advances without learner input&lt;/span&gt;&lt;span&gt;Exit to Studio practice&lt;/span&gt;&lt;/div&gt;

      &lt;/div&gt;

  &lt;section aria-labelledby=&quot;tradeoffs-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;04 / honest trade-offs&lt;/span&gt;
        &lt;h2 id=&quot;tradeoffs-title&quot;&gt;What each route optimizes&lt;/h2&gt;
      &lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;No fake scorecard. Each direction makes a different product bet and creates a different failure mode.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;decision-table&quot; role=&quot;table&quot; aria-label=&quot;Design direction comparison&quot;&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;strong role=&quot;columnheader&quot;&gt;Question&lt;/strong&gt;&lt;strong role=&quot;columnheader&quot;&gt;Atlas&lt;/strong&gt;&lt;strong role=&quot;columnheader&quot;&gt;Studio&lt;/strong&gt;&lt;strong role=&quot;columnheader&quot;&gt;Observatory&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;span role=&quot;rowheader&quot;&gt;Core promise&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;See how ideas connect&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Learn by making moves&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;See the invisible&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;span role=&quot;rowheader&quot;&gt;Home surface&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Knowledge map&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Today’s workbench&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Phenomenon gallery&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;span role=&quot;rowheader&quot;&gt;Navigation&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Spatial and choice-led&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Task and return-loop led&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Narrative sequence&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;span role=&quot;rowheader&quot;&gt;Production&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Heavy taxonomy, reusable shell&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;Reusable primitives, demanding pedagogy&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;High bespoke art and motion burden&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;decision-row&quot; role=&quot;row&quot;&gt;&lt;span role=&quot;rowheader&quot;&gt;Failure mode&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;A pretty sitemap&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;A sterile exercise tool&lt;/span&gt;&lt;span role=&quot;cell&quot;&gt;An interactive documentary&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;synthesis&quot; aria-labelledby=&quot;synthesis-title&quot;&gt;
    &lt;div class=&quot;synthesis-copy&quot;&gt;
      &lt;span class=&quot;kicker text-muted&quot;&gt;05 / strongest synthesis&lt;/span&gt;
      &lt;h2 id=&quot;synthesis-title&quot;&gt;My bet: Atlas outside. Studio inside. Observatory only when an idea deserves spectacle.&lt;/h2&gt;
      &lt;p&gt;This is not a compromise between three aesthetics. It is a hierarchy of jobs: the Atlas answers “where am I?”, the Studio answers “what do I do now?”, and the Observatory answers “why is this idea worth caring about?”&lt;/p&gt;
      &lt;p class=&quot;text-muted&quot;&gt;The characters become the continuity layer across all three: Vera does not decorate vectors; she owns the tools, language and choices of vector territory.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;stack-diagram&quot; aria-label=&quot;Recommended product stack&quot;&gt;
      &lt;div class=&quot;stack-band&quot;&gt;&lt;strong&gt;Atlas&lt;/strong&gt;&lt;span&gt;Orientation, routes, prerequisites, return queue&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;stack-band&quot;&gt;&lt;strong&gt;Studio&lt;/strong&gt;&lt;span&gt;Default lesson loop and practice surface&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;stack-band&quot;&gt;&lt;strong&gt;Observatory&lt;/strong&gt;&lt;span&gt;Selective openings for the hardest, most visual ideas&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;audience-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;06 / product brief locked&lt;/span&gt;
        &lt;h2 id=&quot;audience-title&quot;&gt;An open mathematical world for ambitious adults&lt;/h2&gt;
      &lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;They are not returning to school. They are acquiring mathematical power for a harder thing they already care about.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;audience-contract&quot;&gt;
      &lt;div class=&quot;contract-column&quot;&gt;
        &lt;span class=&quot;micro-label text-muted&quot;&gt;They bring&lt;/span&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Strong motivation and a concrete destination&lt;/li&gt;
          &lt;li&gt;Adult context from work, technology and the physical world&lt;/li&gt;
          &lt;li&gt;Willingness to wrestle with a meaningful problem&lt;/li&gt;
          &lt;li&gt;Low tolerance for childish tone or school-like busywork&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;contract-column&quot;&gt;
        &lt;span class=&quot;micro-label text-muted&quot;&gt;The world owes them&lt;/span&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Cases before disconnected syllabus coverage&lt;/li&gt;
          &lt;li&gt;Just-in-time prerequisite routes, never remedial labels&lt;/li&gt;
          &lt;li&gt;Real formalism once intuition has something to attach to&lt;/li&gt;
          &lt;li&gt;Honest evidence of transfer, not points and completion theatre&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;domain-paths&quot; aria-label=&quot;Three motivating entry paths into the same mathematical world&quot;&gt;
      &lt;article class=&quot;domain-path&quot;&gt;
        &lt;span class=&quot;micro-label text-muted&quot;&gt;Physics &amp; engineering&lt;/span&gt;
        &lt;h3&gt;Control motion and forces&lt;/h3&gt;
        &lt;span class=&quot;path-sequence&quot;&gt;vectors → matrices → calculus → optimisation&lt;/span&gt;
        &lt;p&gt;Cases: robot arms, structures, fields, trajectories and control systems.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;domain-path&quot;&gt;
        &lt;span class=&quot;micro-label text-muted&quot;&gt;Machine learning &amp; AI&lt;/span&gt;
        &lt;h3&gt;Find structure in data&lt;/h3&gt;
        &lt;span class=&quot;path-sequence&quot;&gt;vectors → linear algebra → probability → gradients&lt;/span&gt;
        &lt;p&gt;Cases: embeddings, recommendations, classifiers, uncertainty and training.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;domain-path&quot;&gt;
        &lt;span class=&quot;micro-label text-muted&quot;&gt;Finance&lt;/span&gt;
        &lt;h3&gt;Reason under uncertainty&lt;/h3&gt;
        &lt;span class=&quot;path-sequence&quot;&gt;functions → probability → statistics → optimisation&lt;/span&gt;
        &lt;p&gt;Cases: cashflows, portfolios, risk, inference and decision-making.&lt;/p&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;flagship&quot; aria-labelledby=&quot;flagship-title&quot;&gt;
    &lt;div class=&quot;flagship-copy&quot;&gt;
      &lt;span class=&quot;kicker text-muted&quot;&gt;07 / recommended first vertical slice&lt;/span&gt;
      &lt;h2 id=&quot;flagship-title&quot;&gt;One operation. Three worlds.&lt;/h2&gt;
      &lt;p&gt;Use the dot product to prove the architecture: force along motion in engineering, semantic similarity in AI, and weighted exposure in finance.&lt;/p&gt;
      &lt;p class=&quot;text-muted&quot;&gt;The point is not three analogies. It is the adult revelation that one mathematical structure survives across radically different contexts.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;flagship-loop&quot; aria-label=&quot;Atlas Studio Observatory vertical slice&quot;&gt;
      &lt;div class=&quot;loop-step&quot;&gt;&lt;strong&gt;Observatory&lt;/strong&gt;&lt;span&gt;Open with three systems producing the same mysterious scalar.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;loop-step&quot;&gt;&lt;strong&gt;Studio&lt;/strong&gt;&lt;span&gt;Manipulate direction and magnitude; predict, calculate, explain and transfer.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;loop-step&quot;&gt;&lt;strong&gt;Atlas&lt;/strong&gt;&lt;span&gt;Reveal projection, similarity and weighted combination as connected territory.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;loop-step&quot;&gt;&lt;strong&gt;Detour&lt;/strong&gt;&lt;span&gt;Offer vector or algebra foundations only when the learner’s actions show a gap.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;loop-step&quot;&gt;&lt;strong&gt;Return&lt;/strong&gt;&lt;span&gt;Retrieve the idea later through a new domain, not the original example.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;experiments-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;08 / decide with evidence&lt;/span&gt;
        &lt;h2 id=&quot;experiments-title&quot;&gt;One integrated slice—not a redesign programme&lt;/h2&gt;
      &lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;Use the existing dot-product content as raw material. Test the full architecture before rebuilding the platform.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;experiment-grid&quot;&gt;
      &lt;article class=&quot;experiment&quot;&gt;&lt;span class=&quot;micro-label text-muted&quot;&gt;Test 01 / entry&lt;/span&gt;&lt;h3&gt;Goal before level&lt;/h3&gt;&lt;p&gt;Can an adult enter through a motivating domain case without first choosing a school-grade syllabus?&lt;/p&gt;&lt;/article&gt;
      &lt;article class=&quot;experiment&quot;&gt;&lt;span class=&quot;micro-label text-muted&quot;&gt;Test 02 / learning&lt;/span&gt;&lt;h3&gt;Structure across contexts&lt;/h3&gt;&lt;p&gt;Can they recognise and use the dot product in a second domain after learning it in the first?&lt;/p&gt;&lt;/article&gt;
      &lt;article class=&quot;experiment&quot;&gt;&lt;span class=&quot;micro-label text-muted&quot;&gt;Test 03 / navigation&lt;/span&gt;&lt;h3&gt;Detour without shame&lt;/h3&gt;&lt;p&gt;Can the Atlas route them through a missing prerequisite and return them smoothly to the original goal?&lt;/p&gt;&lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section aria-labelledby=&quot;decision-title&quot;&gt;
    &lt;div class=&quot;section-head&quot;&gt;
      &lt;div&gt;
        &lt;span class=&quot;kicker text-muted&quot;&gt;09 / decisions locked&lt;/span&gt;
        &lt;h2 id=&quot;decision-title&quot;&gt;The rebuild now has a product spine&lt;/h2&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;ol class=&quot;compact-list&quot;&gt;
      &lt;li&gt;&lt;strong&gt;Product:&lt;/strong&gt; an open mathematical world, not a linear course catalogue.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Architecture:&lt;/strong&gt; Atlas outside, Studio inside, Observatory used selectively.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Learner:&lt;/strong&gt; motivated adults rebuilding maths to reach physics, engineering, AI or finance.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Pedagogy:&lt;/strong&gt; active cases, real systems, adult analogies, formal depth and transfer.&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;Next decision:&lt;/strong&gt; approve “One operation, three worlds” as the first tested vertical slice.&lt;/li&gt;
    &lt;/ol&gt;
  &lt;/section&gt;

  &lt;footer class=&quot;source-list&quot; aria-label=&quot;Research sources&quot;&gt;
    &lt;a href=&quot;https://pmc.ncbi.nlm.nih.gov/articles/PMC4060654/&quot;&gt;Freeman et al. — active learning in STEM&lt;/a&gt;
    &lt;a href=&quot;https://eric.ed.gov/?id=EJ1319572&quot;&gt;Agarwal et al. — retrieval practice review&lt;/a&gt;
    &lt;a href=&quot;https://www.cambridge.org/core/books/abs/cambridge-handbook-of-multimedia-learning/principles-for-reducing-extraneous-processing-in-multimedia-learning-coherence-signaling-redundancy-spatial-contiguity-and-temporal-contiguity-principles/CD5B7AE1279A9AB81F8EEBB53DBEC86E&quot;&gt;Mayer &amp; Fiorella — multimedia learning&lt;/a&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;mathland-clean-sheet&#x27;);
      if (!root) return;

      const routeButtons = Array.from(root.querySelectorAll(&#x27;[data-route-button]&#x27;));
      const routePanels = Array.from(root.querySelectorAll(&#x27;[data-route-panel]&#x27;));

      routeButtons.forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          const route = button.getAttribute(&#x27;data-route-button&#x27;);
          routeButtons.forEach((candidate) =&gt; {
            candidate.setAttribute(&#x27;aria-pressed&#x27;, String(candidate === button));
          });
          routePanels.forEach((panel) =&gt; {
            panel.hidden = panel.getAttribute(&#x27;data-route-panel&#x27;) !== route;
          });
        });
      });

      const angleRange = root.querySelector(&#x27;#angleRange&#x27;);
      const vectorV = root.querySelector(&#x27;#vectorV&#x27;);
      const vectorVLabel = root.querySelector(&#x27;#vectorVLabel&#x27;);
      const angleValue = root.querySelector(&#x27;#angleValue&#x27;);
      const dotReading = root.querySelector(&#x27;#dotReading&#x27;);

      const updateVector = () =&gt; {
        if (!angleRange || !vectorV || !vectorVLabel || !angleValue || !dotReading) return;
        const angle = Number(angleRange.value);
        const radians = angle * Math.PI / 180;
        const length = 120;
        const x = 180 + Math.cos(radians) * length;
        const y = 150 - Math.sin(radians) * length;
        vectorV.setAttribute(&#x27;x2&#x27;, x.toFixed(2));
        vectorV.setAttribute(&#x27;y2&#x27;, y.toFixed(2));
        vectorVLabel.setAttribute(&#x27;x&#x27;, (x + 8).toFixed(2));
        vectorVLabel.setAttribute(&#x27;y&#x27;, (y + 14).toFixed(2));
        angleValue.textContent = `${angle}°`;
        const value = Math.cos(radians);
        dotReading.textContent = Math.abs(value) &lt; 0.04
          ? &#x27;Zero — directions are perpendicular&#x27;
          : value &gt; 0
            ? &#x27;Positive — directions broadly agree&#x27;
            : &#x27;Negative — directions broadly oppose&#x27;;
      };

      if (angleRange) {
        angleRange.addEventListener(&#x27;input&#x27;, updateVector);
        updateVector();
      }

      const projectionToggle = root.querySelector(&#x27;#projectionToggle&#x27;);
      const projectionLine = root.querySelector(&#x27;#projectionLine&#x27;);
      const projectionPoint = root.querySelector(&#x27;#projectionPoint&#x27;);
      const projectionText = root.querySelector(&#x27;#projectionText&#x27;);

      if (projectionToggle &amp;&amp; projectionLine &amp;&amp; projectionPoint &amp;&amp; projectionText) {
        projectionToggle.addEventListener(&#x27;click&#x27;, () =&gt; {
          const isShown = projectionToggle.getAttribute(&#x27;aria-pressed&#x27;) === &#x27;true&#x27;;
          projectionToggle.setAttribute(&#x27;aria-pressed&#x27;, String(!isShown));
          projectionToggle.textContent = isShown ? &#x27;Reveal projection&#x27; : &#x27;Hide projection&#x27;;
          projectionLine.setAttribute(&#x27;opacity&#x27;, isShown ? &#x27;0&#x27; : &#x27;1&#x27;);
          projectionPoint.setAttribute(&#x27;opacity&#x27;, isShown ? &#x27;0&#x27; : &#x27;1&#x27;);
          projectionText.hidden = isShown;
        });
      }
    })();
  &lt;/script&gt;
&lt;/main&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
